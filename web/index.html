<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Mehrigiyo CRM boshqaruv tizimi">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mehrigiyo CRM">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Mehrigiyo CRM</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Branded splash shown while the Flutter engine boots. Removed on the
       `flutter-first-frame` event below. */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      background: linear-gradient(160deg, #071510 0%, #0A2319 55%, #0E3D2E 100%);
      z-index: 9999;
      transition: opacity 0.35s ease-out;
    }
    #splash.done {
      opacity: 0;
      pointer-events: none;
    }
    #splash .logo {
      width: 84px;
      height: 84px;
      border-radius: 22px;
      background: rgba(26, 171, 135, 0.12);
      border: 1px solid rgba(26, 171, 135, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: splash-pulse 2.2s ease-in-out infinite;
    }
    #splash .logo svg { width: 44px; height: 44px; }
    #splash .title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: #E6F4F0;
    }
    #splash .bar {
      width: 132px;
      height: 3px;
      border-radius: 3px;
      background: rgba(230, 244, 240, 0.14);
      overflow: hidden;
    }
    #splash .bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      border-radius: 3px;
      background: #1AAB87;
      animation: splash-slide 1.1s ease-in-out infinite;
    }
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(26, 171, 135, 0.25); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 16px rgba(26, 171, 135, 0); }
    }
    @keyframes splash-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(330%); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C7 6 4 9.5 4 14a8 8 0 0 0 16 0c0-4.5-3-8-8-12Z"
              stroke="#1AAB87" stroke-width="1.6" fill="rgba(26,171,135,0.18)"/>
        <path d="M12 22V8M12 12l3.5-3M12 15l-3.5-3"
              stroke="#1AAB87" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="title">Mehrigiyo CRM</div>
    <div class="bar"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (!splash) return;
      splash.classList.add('done');
      setTimeout(function () { splash.remove(); }, 400);
    });
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
